[colors]
background = ${xrdb:color0}
foreground = ${xrdb:color6}
foreground-alt=${xrdb:color0}

primary = #F0C674
secondary = #8ABEB7
alert = #A54242
disabled = #707880

i3_background = ${xrdb:color3}
i3_foreground = ${xrdb:color7}
i3_urgent_background = ${xrdb:color5}
i3_unfocused_foreground = ${xrdb:color2}

status_good = ${xrdb:color7}
status_sub = ${xrdb:color6}
status_bad = ${xrdb:color5}

line-color = #FFFFFF
transparent = #00FFFFFF

tray_background = #00FFFFFF 

[const]
width = 100%
height = 32
clickarea = 25

border-left-size = 10
border-right = 10
border-top = 2

module-margin-left = 0
module-margin-right = 4

spacing = 1
line-height = 4 

line-size = 3

radius = 10
radius-top = 4
radius-bottom = 0

;font-4 = FontAwesome:size=16;3
;font-1 = misc tamsyn:pixelsize=16;2
;font-3 = Unifont:size=11;3
;font-2 = symbola:size=18;3
;font-0 = Wuncon Siji:pixelsize=11;3

#font-0 = Wuncon Siji:pixelsize=11;3
font-0 = NotoSans-Regular:size=11;3
font-1 = NotoEmoji:size=11;3
#font-1 = misc tamsyn:pixelsize=18;2
font-2 = FontAwesome5Free:style=Solid:size=15;3
font-3 = FontAwesome5Brands:style=Solid:size=15;3
font-4 = symbola:size=18;3
font-5 = FiraMono:NotoEmoji:pixelsize=11;3
font-emoji-n = 6

[section/base]
modules-left = i3 xwindow
monitor = ${env:MONITOR:eDP1}
border-left-size = 6pt
border-right-size = 6pt
border-top-size = 6pt
border-bottom-size = 0
border-color = #00000000
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 8pt
padding-left = 0
padding-right = 1
module-margin = 1
separator = |


[bar/main]
inherit = section/base
width = 100%
height = 35pt
radius = 0

separator-foreground = ${colors.disabled}
font-0 = monospace;2
modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth date
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

; # Tray
tray-position = right
tray-padding = 2
tray-background = ${colors.background}


[bar/secondary]
inherit = section/base
width = 100%
height = 35pt
radius = 0

separator-foreground = ${colors.disabled}
font-0 = monospace;2
modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth date
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

; # Tray
tray-position = right
tray-padding = 2
tray-background = ${colors.background}



[module/i3]
type = internal/i3

; Only show workspaces defined on the same output as the bar
;
; Useful if you want to show monitor specific workspaces
; on different bars
;
; Default: false
pin-workspaces = true

; Show urgent workspaces regardless of whether the workspace is actually hidden 
; by pin-workspaces.
;
; Default: false
; New in version 3.6.0
show-urgent = true

; This will split the workspace name on ':'
; Default: false
strip-wsnumbers = true

; Sort the workspaces by index instead of the default
; sorting that groups the workspaces by output
; Default: false
index-sort = true

; Create click handler used to focus workspace
; Default: true
enable-click = false

; Create scroll handlers used to cycle workspaces
; Default: true
enable-scroll = false

; Wrap around when reaching the first/last workspace
; Default: true
wrapping-scroll = false

; Set the scroll cycle direction 
; Default: true
reverse-scroll = false

; Use fuzzy (partial) matching on labels when assigning 
; icons to workspaces
; Example: code;‚ôö will apply the icon to all workspaces 
; containing 'code' in the label
; Default: false
fuzzy-match = true

; Available tokens:
;   %mode%
; Default: %mode%
label-mode = %mode%
label-mode-padding = 2
label-mode-background = #e60053

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-focused = %index%
label-focused-foreground = ${colors.i3_foreground}
label-focused-background = ${colors.i3_background}
label-focused-underline = ${colors.foreground}
label-focused-padding = 2

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-unfocused = %index%
label-unfocused-padding = 2
label-unfocused-foreground = ${colors.i3_unfocused_foreground}

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-visible = %index%
label-visible-underline = #555555
label-visible-padding = 2

; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-urgent = %index%
label-urgent-foreground = ${colors.i3_foreground}
label-urgent-background = ${colors.i3_urgent_background}
label-urgent-padding = 2

; Separator in between workspaces
; label-separator = |
; label-separator-padding = 0
; label-separator-foreground = #ffb52a

; [module/i3]
; type = internal/i3
; pin-workspaces = true

; label-active = %name%
; label-active-background = ${colors.background-alt}
; label-active-underline= ${colors.primary}
; label-active-padding = 1

; label-occupied = %name%
; label-occupied-padding = 1

; label-urgent = %name%
; label-urgent-background = ${colors.alert}
; label-urgent-padding = 1

; label-empty = %name%
; label-empty-foreground = ${colors.disabled}
; label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
