include-directory = /home/oriely/.config/polybar/includes

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini


[section/base]
modules-left = i3 mail reddit github xwindow 
border-left-size = 15px
border-right-size = 15px
border-top-size = 15px
module-margin-left = 0
module-margin-right = 0
border-bottom-size = 0
border-color = #00000000
line-size = 2pt
padding-left = 0    
padding-right = 0
font-0 = "Fira Mono:pixelsize=10;3"
font-1 = "Font Awesome 6 Free Solid:size=12;3"

font-2 = "Font Awesome 6 Brands Regular:size=12;3"
font-3 = "Iosevka Nerd Font:style=Medium:size=22;3"
font-4 = "Iosevka Nerd Font:pixelsize=13;3"
background = ${pycol.0}
; transparent #00000000

tray-background = ${pycol.0}
width = 100%
height = 25pt

[bar/main]
monitor = ${env:MONITOR:eDP1}
inherit = section/base

radius = 0
separator-foreground = ${colors.disabled}
modules-center = mpd infocava
modules-right = right1 memory right2 cpu right3 date right4 pulseaudio right5 discord steam bluetooth rofi 
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
tray-position = right

[bar/secondary]
monitor = ${env:MONITOR:eDP1}
inherit = section/base
width = 100%
radius = 0
separator-foreground = ${colors.disabled}
modules-center = mpd infocava
modules-right = right1 memory right2 cpu right3 date right4 pulseaudio right5 discord steam bluetooth rofi
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

