
[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = true
wrapping-scroll = false
reverse-scroll = false
fuzzy-match = true
label-mode = %mode%
label-mode-padding = 4
label-mode-background = #e60053

ws-icon-0 = 1;
ws-icon-1 = 2;
ws-icon-2 = 3;
ws-icon-3 = 4;
ws-icon-4 = 5;
ws-icon-5 = 6;
ws-icon-6 = 7;
ws-icon-default = ♟
format = <label-state> <label-mode>
; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-focused = %index%
label-focused-foreground = ${colors.i3_foreground}
label-focused-background = ${colors.i3_background}
label-focused-underline =  ${colors.line-color}
label-focused-padding = 2


; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-unfocused = %index%
label-unfocused-padding = 2
label-unfocused-underline =  ${colors.line-color}
label-unfocused-foreground = ${colors.text-color}
label-unfocused-background = ${pycol.0}
; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-visible = %index%
label-visible-underline = ${colors.line-color}
label-visible-padding = 2
label-visible-foreground = ${colors.text-color}
label-visible-background = ${pycol.0}
; Available tokens:
;   %name%
;   %icon%
;   %index%
;   %output%
; Default: %icon% %name%
label-urgent = %index%
label-urgent-foreground = ${colors.i3_foreground}
label-urgent-background = ${colors.i3_urgent_background}
label-urgent-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:35:...%
format-padding = 1
format-background = ${pycol.0}
[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}



[module/memory]
type = internal/memory
interval = 2
format-prefix = ""
format-prefix-foreground = ${colors.primary}
label = %percentage_used:3%%
format-background = ${pycol.2}
;format-padding = 2

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = ""
format-prefix-foreground = ${colors.primary}

label = %percentage:3%%
format-background = ${pycol.3}
;format-padding = 2


[module/date]
type = internal/date

; Seconds to sleep between updates
interval = 1.0

; See "http://en.cppreference.com/w/cpp/io/manip/put_time" for details on how to format the date string
; NOTE: if you want to use syntax tags here you need to use %%{...}
;;date = %Y-%m-%d%

; Optional time format
time = "🕓 %I:%M %p"

; if `date-alt` or `time-alt` is defined, clicking
; the module will toggle between formats
;;date-alt = %A, %d %B %Y
time-alt = " %a, %d %b %Y"

; Available tags:
;   <label> (default)
format = <label>
format-background =  ${pycol.4}
;format-padding = 2

; Available tokens:
;   %date%
;   %time%
; Default: %date%
label = %time%




; If you use both a wired and a wireless network, just add 2 module definitions. For example
; [module/wired-network]
; type = internal/network
; interface = eno1

; [module/wireless-network]
; type = internal/network
; interface = wlp4s0

; Normal Module
; [module/network]
; type = internal/network
; interface = wlp4s0

; ; Seconds to sleep between updates
; ; Default: 1
; interval = 1.0

; ; Test connectivity every Nth update
; ; A value of 0 disables the feature
; ; NOTE: Experimental (needs more testing)
; ; Default: 0
; ;ping-interval = 3

; ; @deprecated: Define min width using token specifiers (%downspeed:min% and %upspeed:min%)
; ; Minimum output width of upload/download rate
; ; Default: 3
; ;;udspeed-minwidth = 5

; ; Accumulate values from all interfaces
; ; when querying for up/downspeed rate
; ; Default: false
; accumulate-stats = true

; ; Consider an `UNKNOWN` interface state as up.
; ; Some devices have an unknown state, even when they're running
; ; Default: false
; unknown-as-up = true

; ; Available tags:
; ;   <label-connected> (default)
; ;   <ramp-signal>
; format-connected = <ramp-signal> <label-connected>
; format-connected-background = ${color.shade4}
; format-connected-padding = 2

; ; Available tags:
; ;   <label-disconnected> (default)
; format-disconnected = <label-disconnected>
; format-disconnected-prefix = disconnected
; format-disconnected-background = #000000
; format-disconnected-padding = 2

; ; Available tags:
; ;   <label-connected> (default)
; ;   <label-packetloss>
; ;   <animation-packetloss>
; ;;format-packetloss = <animation-packetloss> <label-connected>

; ; Available tokens:
; ;   %ifname%    [wireless+wired]
; ;   %local_ip%  [wireless+wired]
; ;   %local_ip6% [wireless+wired]
; ;   %essid%     [wireless]
; ;   %signal%    [wireless]
; ;   %upspeed%   [wireless+wired]
; ;   %downspeed% [wireless+wired]
; ;   %linkspeed% [wired]
; ; Default: %ifname% %local_ip%
; label-connected = "%{A1:networkmanager_dmenu &:}%essid%%{A}"

; ; Available tokens:
; ;   %ifname%    [wireless+wired]
; ; Default: (none)
; label-disconnected = "%{A1:networkmanager_dmenu &:} Offline%{A}"
; ;;label-disconnected-foreground = #66ffffff

; ; Available tokens:
; ;   %ifname%    [wireless+wired]
; ;   %local_ip%  [wireless+wired]
; ;   %local_ip6% [wireless+wired]
; ;   %essid%     [wireless]
; ;   %signal%    [wireless]
; ;   %upspeed%   [wireless+wired]
; ;   %downspeed% [wireless+wired]
; ;   %linkspeed% [wired]
; ; Default: (none)
; ;label-packetloss = %essid%
; ;label-packetloss-foreground = #eefafafa

; ; Only applies if <ramp-signal> is used
; ramp-signal-0 = 1
; ramp-signal-1 = 2
; ramp-signal-2 = 3

; ; Only applies if <animation-packetloss> is used
; ;;animation-packetloss-0 = ⚠
; ;;animation-packetloss-0-foreground = #ffa64c
; ;;animation-packetloss-1 = ⚠
; ;;animation-packetloss-1-foreground = #000000
; ; Framerate in milliseconds
; ;;animation-packetloss-framerate = 500

; ;; _-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_-_


; ; Defines a module named 'mymodule'


[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = ""
format-volume-prefix-foreground = ${colors.primary}
format-volume = <ramp-volume> <label-volume>

label-volume = %percentage:2%%
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
label-muted = 
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol
format-volume-background = ${pycol.5}
;format-volume-padding = 2
;format-muted-padding = 2
format-muted-background = ${pycol.5}
format-foreground = ${pycol.3}

[module/pulseaudio2]
type = internal/pulseaudio

format-volume-prefix = ""
format-volume-prefix-foreground = ${colors.primary}
format-volume = <ramp-volume> <label-volume>

label-volume = %percentage:2%%
ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
label-muted = 
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol
format-volume-background = ${pycol.5}
format-volume-padding = 2
format-muted-padding = 2
format-muted-background = ${pycol.5}
format-foreground = ${pycol.3}

[module/mpd]
type = internal/mpd

; Host where mpd is running (either ip or domain name)
; Can also be the full path to a unix socket where mpd is running.
host = /home/oriely/.config/mpd/socket

; Seconds to sleep between progressbar/song timer sync
; Default: 1
interval = 2
; Available tags:
;   <label-song> (default)
;   <label-time>
;   <bar-progress>
;   <toggle> - gets replaced with <icon-(pause|play)>
;   <toggle-stop> - gets replaced with <icon-(stop|play)>
;   <icon-random>
;   <icon-repeat>
;   <icon-repeatone> (deprecated)
;   <icon-single> - Toggle playing only a single song. Replaces <icon-repeatone>
;   <icon-consume>
;   <icon-prev>
;   <icon-stop>
;   <icon-play>
;   <icon-pause>
;   <icon-next>
;   <icon-seekb>
;   <icon-seekf>
format-online = <icon-prev> <icon-seekb> <icon-stop> <toggle> <icon-seekf> <icon-next>  <icon-repeat> <icon-random>  <bar-progress> <label-time>  <label-song>
;format-playing = ${self.format-online}
;format-paused = ${self.format-online}
;format-stopped = ${self.format-online}

; Available tags:
;   <label-offline>
; Default: ""
;format-offline = <label-offline>

; Available tokens:
;   %artist%
;   %album-artist%
;   %album%
;   %date%
;   %title%
; Default: %artist% - %title%
label-song = %artist% - %title:0:10:...%

; Available tokens:
;   %elapsed%
;   %total%
; Default: %elapsed% / %total%
;label-time = %elapsed% / %total%

; Available tokens:
;   None
label-offline = 🎜 mpd is offline

; Only applies if <icon-X> is used
icon-play = ⏵
icon-pause = ⏸
icon-stop = ⏹
icon-prev = ⏮
icon-next = ⏭
icon-seekb = ⏪
icon-seekf = ⏩
icon-random = 🔀
icon-repeat = 🔁
icon-repeatone = 🔂
icon-single = 🔂
icon-consume = ✀

; Used to display the state of random/repeat/repeatone/single
; Only applies if <icon-[random|repeat|repeatone|single]> is used
toggle-on-foreground = #ff
toggle-off-foreground = #55

format-online-background = ${pycol.0}
format-online-padding = 2

; Only applies if <bar-progress> is used
bar-progress-width = 20
bar-progress-indicator = |
bar-progress-fill = ─
bar-progress-empty = ─

[module/infocava]
type = custom/script
exec = ~/.custom-scripts/polybar/info-cava.py -f 60 -b 12 -e fffdfc,fffafe,ffeafa,ffc3d2 -c average
tail = true