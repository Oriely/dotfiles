
[module/links]
type = custom/text
content-foreground = ${color.foreground-alt}
content-padding = 1
content-background = ${pycol.0}

[module/mail]
inherit = module/links
content = 
click-left = firefox "https://mail.proton.me"

[module/github]
inherit = module/links
content = 
click-left = firefox "https://www.github.com"

[module/reddit]
inherit = module/links
content = 
click-left = firefox "https://www.reddit.com"

[module/youtube]
inherit = module/links
content = 
click-left = firefox "https://www.youtube.com"

[module/steam]
inherit = module/links
content = 
click-left = steam -silent %U W

[module/discord]
inherit = module/links
content = 
click-left = discord

[module/bluetooth]
inherit = module/links
content = 
click-left = blueberry

[module/rofi]
inherit = module/links
content = 
click-left = $HOME/.custom-scripts/rofi.sh
content-background = ${pycol.0} 


[module/infocava]
type = custom/script
exec = ~/.custom-scripts/polybar/info-cava.py -f 60 -b 30 -e fffdfc,fffafe,ffeafa,ffc3d2
tail = true
format-font  = "Iosevka Nerd Font:pixelsize=10;20"